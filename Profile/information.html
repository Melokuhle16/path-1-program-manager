<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Broadcast Program Form</title>
  <link rel="stylesheet" href="information.css">
</head>
<body>
  <div class="container">
    <div class="program-form">
      <h2>Broadcast Program Form</h2>
      <p class="subtitle">Enter program details below</p>

      <form>
        <div class="form-group">
          <label for="programName">Program Name</label>
          <input type="text" id="programName" name="programName" required>
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" name="description" required></textarea>
        </div>

        <div class="grid">
          <div class="form-group">
            <label for="duration">Duration (minutes)</label>
            <input type="number" id="duration" name="duration" min="1" required>
          </div>
          <div class="form-group">
            <label for="timeSlot">Time Slot</label>
            <input type="time" id="timeSlot" name="timeSlot" required>
          </div>
        </div>

        <div class="form-group">
          <label for="channel">Channel</label>
          <select id="channel" name="channel" required>
            <option value="SABC1">SABC1</option>
            <option value="SABC2">SABC2</option>
            <option value="SABC3">SABC3</option>
            <option value="eTV">eTV</option>
          </select>
        </div>

        <div class="checkbox">
          <input type="checkbox" id="isLive" name="isLive">
          <label for="isLive">Is Live?</label>
        </div>

        <button type="submit">Submit</button>
      </form>
    </div>
  </div>
</body>
</html>
