<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Program Manager</title>

  <link rel="stylesheet" href="info.css">
</head>
"Version B"
<body>

  <!-- Navigation -->
  <nav class="navbar">

    <h2 class="logo">Program Manager</h2>

    <div class="nav-links">
      <a href="#programListSection">Programs</a>
    </div>

  </nav>

  <!-- Program List -->
   <section>
    <h2>About Our Project</h2>
    <h3>Project Overview!!</h3>
    <p>This project demonstrates Git workflow.</p>
</section>

  <section id="programListSection" class="container">

    <h1>Broadcast Programs</h1>

    <input
      type="text"
      id="searchInput"
      placeholder="Search program..."
      oninput="searchPrograms()"
    >

    <div id="programList"></div>

  </section>

  <!-- Form -->
  <section id="formSection" class="container">

    <div class="form-card">

      <h1>Broadcast Program Form</h1>

      <form id="programForm" onsubmit="addProgram(event)">

        <label>Program Name</label>
        <input type="text" id="programName" required>

        <label>Description</label>
        <textarea id="description" required></textarea>

        <label>Duration(MINUTES)</label>
        <input type="number" id="duration" required>

        <label>Time Slot</label>
        <input type="time" id="timeSlot" required>

        <label>Channel</label>
        <select id="channel" required>
          <option value="">Select Channel</option>
          <option>SABC1</option>
          <option>SABC2</option>
          <option>SABC3</option>
          <option>eTV</option>
        </select>

        <button type="submit">Add Program</button>

      </form>

      <p id="message"></p>

    </div>

  </section>

  <script src="info.js"></script>

</body>
</html>
